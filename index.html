<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えらんで！プレゼンター (スプレッドシート版)</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    body {
        font-family: 'M PLUS Rounded 1c', sans-serif;
        background-color: #fdf6e3;
        margin: 0;
        padding: 20px;
        text-align: center;
    }
    h1 {
        color: #ff6b6b;
        font-size: 3rem;
        margin-top: 10px;
        margin-bottom: 20px;
    }
    .tabs {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
    }
    .tab-btn {
        font-size: 2rem;
        padding: 10px 40px;
        border-radius: 50px;
        border: 4px solid #ccc;
        background-color: white;
        cursor: pointer;
        font-family: inherit;
        font-weight: 800;
        transition: 0.2s;
    }
    .tab-btn.active.play { border-color: #4dabf7; background-color: #e7f5ff; color: #1864ab; }
    .tab-btn.active.eat { border-color: #ff922b; background-color: #fff4e6; color: #d9480f; }
    
    .filter-btn {
        font-size: 1.5rem;
        padding: 10px 20px;
        border-radius: 20px;
        border: none;
        background-color: #ff8787;
        color: white;
        cursor: pointer;
        font-family: inherit;
        font-weight: 800;
        margin-bottom: 30px;
    }
    .filter-btn.filtering {
        background-color: #e03131;
        box-shadow: 0 0 10px rgba(224, 49, 49, 0.5);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        padding: 0 20px;
    }
    .card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        position: relative;
        transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-5px); }
    .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        cursor: pointer;
    }
    .card-title {
        font-size: 1.5rem;
        font-weight: 800;
        padding: 15px;
        margin: 0;
    }
    .heart-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(255,255,255,0.8);
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 2rem;
        color: #ccc;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .heart-btn.liked { color: #ff6b6b; }

    #modal {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        flex-direction: column;
    }
    #modal img {
        max-width: 90%;
        max-height: 80%;
        border-radius: 20px;
        border: 5px solid white;
    }
    #modal-title {
        color: white;
        font-size: 2.5rem;
        margin-top: 20px;
    }
    .close-btn {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 4rem;
        cursor: pointer;
        font-weight: bold;
    }
    #loading {
        font-size: 2rem;
        color: #666;
        margin-top: 50px;
    }
</style>
</head>
<body>

    <h1>✨ どこにいく？ なにたべる？ ✨</h1>

    <div class="tabs">
        <button class="tab-btn active play" onclick="changeTab('play')">🎡 あそぶ</button>
        <button class="tab-btn eat" onclick="changeTab('eat')">🍔 たべる</button>
    </div>

    <button id="filterBtn" class="filter-btn" onclick="toggleFilter()">
        <i class="fa-solid fa-heart"></i> お気に入りだけみる
    </button>

    <div id="loading">データを よみこんでいます...</div>
    <div class="grid" id="cardGrid"></div>

    <div id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modal-img" src="" alt="">
        <div id="modal-title"></div>
    </div>

<script>
    // ーーー【設定】ここにスプレッドシートで取得したCSVのURLを貼り付けてください ーーー
    const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQERcgQgCQVotbFi5IGy_djP50D3c59AHsR6q5X2PE4Wzpeb8WDwiTvQV3kDF-Z7jFBnBhuxtu9CY7P/pub?output=csv';
    // ーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーー

    let data = [];
    let currentTab = 'play';
    let showOnlyLiked = false;

    // スプレッドシートからデータを取得する関数
    function loadData() {
        if (spreadsheetUrl.includes('ここにコピーしたURL')) {
            document.getElementById('loading').innerText = 'エラー: スプレッドシートのURLを設定してください。';
            return;
        }

        Papa.parse(spreadsheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                // 読み込んだデータにIDと初期のいいね状態（liked: false）を追加
                data = results.data.map((item, index) => ({
                    id: index + 1,
                    type: item.type ? item.type.trim() : '',
                    title: item.title ? item.title.trim() : '',
                    img: item.img ? item.img.trim() : '',
                    liked: false
                }));
                
                document.getElementById('loading').style.display = 'none';
                renderCards();
            },
            error: function(err) {
                document.getElementById('loading').innerText = 'データの読み込みに失敗しました。';
                console.error(err);
            }
        });
    }

    function renderCards() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';

        data.forEach(item => {
            if (item.type !== currentTab) return;
            if (showOnlyLiked && !item.liked) return;

            const card = document.createElement('div');
            card.className = 'card';
            
            const heartClass = item.liked ? 'fa-solid fa-heart liked' : 'fa-solid fa-heart';

            card.innerHTML = `
                <button class="heart-btn ${item.liked ? 'liked' : ''}" onclick="toggleLike(${item.id})">
                    <i class="${heartClass}"></i>
                </button>
                <img src="${item.img}" onclick="openModal('${item.img}', '${item.title}')">
                <p class="card-title">${item.title}</p>
            `;
            grid.appendChild(card);
        });
    }

    function changeTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector('.tab-btn.' + tab).classList.add('active');
        renderCards();
    }

    function toggleLike(id) {
        const item = data.find(d => d.id === id);
        if (item) {
            item.liked = !item.liked;
            renderCards();
        }
    }

    function toggleFilter() {
        showOnlyLiked = !showOnlyLiked;
        const btn = document.getElementById('filterBtn');
        if (showOnlyLiked) {
            btn.classList.add('filtering');
            btn.innerHTML = '<i class="fa-solid fa-heart"></i> ぜんぶみる';
        } else {
            btn.classList.remove('filtering');
            btn.innerHTML = '<i class="fa-solid fa-heart"></i> お気に入りだけみる';
        }
        renderCards();
    }

    function openModal(imgSrc, title) {
        document.getElementById('modal-img').src = imgSrc;
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ページが開かれたら自動でスプレッドシートを読み込む
    window.onload = loadData;
</script>

</body>
</html>
