<!-- Version: 1.11 (アイテム/画像切替ナビUI分離) -->
<!-- ========================================== -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えらんで！プレゼンター</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: #fdf6e3; margin: 0; padding: 20px; text-align: center; color: #333; }
    h1 { color: #ff6b6b; font-size: 2.5rem; margin-top: 10px; margin-bottom: 20px; }
    
    .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { font-size: 1.2rem; padding: 10px 20px; border-radius: 50px; border: 4px solid #ccc; background-color: white; cursor: pointer; font-family: inherit; font-weight: 800; transition: 0.2s; }
    
    .tab-btn.active.play { border-color: #4dabf7; background-color: #e7f5ff; color: #1864ab; }
    .tab-btn.active.eat { border-color: #ff922b; background-color: #fff4e6; color: #d9480f; }
    .tab-btn.active.go_out { border-color: #20c997; background-color: #e6fcf5; color: #087f5b; }
    .tab-btn.active.eat_out { border-color: #f06595; background-color: #fff0f6; color: #a61e4d; }
    
    .action-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
    .action-btn { font-size: 1.2rem; padding: 10px 20px; border-radius: 20px; border: none; color: white; cursor: pointer; font-family: inherit; font-weight: 800; transition: transform 0.1s, box-shadow 0.2s; }
    .action-btn:active { transform: scale(0.95); }
    
    .filter-btn { background-color: #ff8787; }
    .filter-btn.filtering { background-color: #e03131; box-shadow: 0 0 10px rgba(224, 49, 49, 0.5); }
    .shuffle-btn { background-color: #4caf50; }
    .shuffle-btn:hover { background-color: #43a047; }
    .location-btn { background-color: #20c997; }
    .location-btn.active { background-color: #0ca678; box-shadow: 0 0 10px rgba(12, 166, 120, 0.5); }

    #location-filter-panel { display: none; background: white; border-radius: 15px; padding: 20px; margin: 0 auto 20px auto; max-width: 800px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: left; }
    .filter-group { margin-bottom: 15px; }
    .filter-group-title { font-size: 1.1rem; font-weight: 800; color: #495057; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }
    .filter-labels { display: flex; flex-wrap: wrap; gap: 10px; }
    .filter-checkbox { display: inline-flex; align-items: center; gap: 5px; background: #f1f3f5; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: 800; transition: 0.2s; user-select: none; }
    .filter-checkbox:hover { background: #e9ecef; }
    .filter-checkbox input { cursor: pointer; transform: scale(1.2); margin-right: 5px; }
    .filter-checkbox.checked { background: #e6fcf5; color: #0ca678; border: 1px solid #20c997; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 0 10px; }
    
    .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.1); position: relative; transition: transform 0.2s; cursor: pointer; }
    .card:hover { transform: translateY(-5px); }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .card-info { padding: 15px; text-align: left; }
    .card-title { font-size: 1.4rem; font-weight: 800; margin: 0 0 5px 0; }
    
    .card-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; flex-wrap: wrap; }
    .card-category { display: inline-block; background-color: #f1f3f5; color: #495057; font-size: 0.8rem; padding: 3px 10px; border-radius: 10px; font-weight: 800; }
    .card-address { font-size: 0.8rem; color: #868e96; font-weight: 800; }
    
    .heart-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 2rem; color: #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
    .heart-btn.liked { color: #ff6b6b; }
    
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: #fff; width: 90%; max-width: 800px; border-radius: 20px; overflow: hidden; position: relative; display: flex; flex-direction: column; max-height: 90vh; z-index: 1010; }
    .close-btn { position: absolute; top: 10px; right: 20px; color: #333; font-size: 3rem; cursor: pointer; font-weight: bold; z-index: 100; background: rgba(255,255,255,0.7); border-radius: 50%; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
    
    /* 1. アイテム切り替え用ナビボタン（<< >>）/ モーダル外側 */
    .item-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.5rem; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1020; transition: 0.2s; font-weight: bold; }
    .item-nav-btn:hover { background: rgba(0,0,0,0.9); scale: 1.1; }
    .item-prev { left: 10px; }
    .item-next { right: 10px; }

    /* 2. ギャラリー画像切り替え用ナビボタン（< >）/ モーダル内側 */
    .gallery-wrapper { position: relative; width: 100%; height: 400px; }
    .gallery-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1.5rem; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10; transition: 0.2s; font-weight: bold; }
    .gallery-nav-btn:hover { background: #fff; scale: 1.1; }
    .gallery-prev { left: 10px; }
    .gallery-next { right: 10px; }

    .modal-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 100%; background: #eee; scroll-behavior: smooth; }
    /* スクロールバーを隠す（ボタンで操作させるため見た目をスッキリ） */
    .modal-gallery::-webkit-scrollbar { display: none; }
    .modal-gallery { -ms-overflow-style: none; scrollbar-width: none; }
    
    .modal-gallery img { width: 100%; height: 100%; object-fit: cover; scroll-snap-align: center; flex-shrink: 0; }
    .modal-info { padding: 20px; text-align: left; overflow-y: auto; }
    .modal-title { font-size: 2rem; font-weight: 800; margin: 0 0 10px 0; color: #ff6b6b; }
    .modal-comment { font-size: 1.2rem; margin: 10px 0 15px 0; line-height: 1.5; font-weight: 500; }
    
    .modal-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; border-top: 2px dashed #eee; padding-top: 15px; }
    .link-btn { text-decoration: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 1rem; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
    .link-btn:hover { opacity: 0.8; }
    .link-map { background-color: #e3f2fd; color: #1976d2; border: 2px solid #bbdefb; }
    .link-img { background-color: #f3e5f5; color: #7b1fa2; border: 2px solid #e1bee7; }
    .link-web { background-color: #e8f5e9; color: #388e3c; border: 2px solid #c8e6c9; }

    #loading { font-size: 1.5rem; color: #666; margin-top: 50px; font-weight: bold; }
    .version-display { position: fixed; bottom: 10px; right: 15px; color: #aaa; font-size: 0.9rem; font-family: monospace; }
</style>
</head>
<body>

    <h1>✨ どこにいく？ なにたべる？ ✨</h1>

    <div class="tabs">
        <button class="tab-btn active play" onclick="changeTab('play')">🎡 あそぶ</button>
        <button class="tab-btn eat" onclick="changeTab('eat')">🍔 たべる</button>
        <button class="tab-btn go_out" onclick="changeTab('go_out')">🚗 お出かけ</button>
        <button class="tab-btn eat_out" onclick="changeTab('eat_out')">🍽️ 外食</button>
    </div>

    <div class="action-buttons">
        <button id="locationBtn" class="action-btn location-btn" onclick="toggleLocationPanel()">
            <i class="fa-solid fa-map-location-dot"></i> ばしょでしぼる
        </button>
        <button id="filterBtn" class="action-btn filter-btn" onclick="toggleFilter()">
            <i class="fa-solid fa-heart"></i> お気に入りだけ
        </button>
        <button class="action-btn shuffle-btn" onclick="shuffleCards()">
            <i class="fa-solid fa-shuffle"></i> シャッフル！
        </button>
    </div>

    <div id="location-filter-panel"></div>

    <div id="loading">データを よみこんでいます...</div>
    <div class="grid" id="cardGrid"></div>

    <!-- ポップアップ本体 -->
    <div id="modal" data-current-id="">
        
        <!-- 外側：アイテム切替ボタン（<< >>） -->
        <button class="item-nav-btn item-prev" onclick="prevModal(event)">＜＜</button>
        <button class="item-nav-btn item-next" onclick="nextModal(event)">＞＞</button>

        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">×</span>
            
            <!-- 内側：画像ギャラリー -->
            <div class="gallery-wrapper">
                <!-- 内側：画像切替ボタン（< >） -->
                <button class="gallery-nav-btn gallery-prev" id="gallery-prev-btn" onclick="scrollGallery(-1, event)">＜</button>
                <button class="gallery-nav-btn gallery-next" id="gallery-next-btn" onclick="scrollGallery(1, event)">＞</button>
                
                <div class="modal-gallery" id="modal-gallery"></div>
            </div>
            
            <div class="modal-info">
                <span class="card-category" id="modal-category"></span>
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-comment" id="modal-comment"></p>
                <div class="modal-links">
                    <a id="link-map" href="#" target="_blank" class="link-btn link-map"><i class="fa-solid fa-map-location-dot"></i> マップ</a>
                    <a id="link-img" href="#" target="_blank" class="link-btn link-img"><i class="fa-solid fa-images"></i> しゃしん</a>
                    <a id="link-web" href="#" target="_blank" class="link-btn link-web"><i class="fa-solid fa-globe"></i> こうしき</a>
                </div>
            </div>
        </div>
    </div>

    <div class="version-display">v1.11</div>

<script>
    // ーーー【設定】ここにCSVのURLを貼り付けてください ーーー
    const spreadsheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQERcgQgCQVotbFi5IGy_djP50D3c59AHsR6q5X2PE4Wzpeb8WDwiTvQV3kDF-Z7jFBnBhuxtu9CY7P/pub?output=csv';
    // ーーーーーーーーーーーーーーーーーーーーーーーーーーーーーー

    let data = [];
    let currentDisplayData = []; 
    let currentTab = 'play';
    let showOnlyLiked = false;
    let activeLocationFilters = new Set();

    const regionMap = {
        "ちかくのエリア（市）": ["横浜市", "川崎市", "藤沢市"],
        "北海道・東北": ["北海道", "青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"],
        "関東": ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県"],
        "中部": ["新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県", "静岡県", "愛知県"],
        "近畿": ["三重県", "滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"],
        "中国・四国": ["鳥取県", "島根県", "岡山県", "広島県", "山口県", "徳島県", "香川県", "愛媛県", "高知県"],
        "九州・沖縄": ["福岡県", "佐賀県", "長崎県", "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"]
    };

    function getRegion(locationStr) {
        for (let r in regionMap) {
            if (regionMap[r].includes(locationStr)) return r;
        }
        return "その他";
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function loadData() {
        const loadingEl = document.getElementById('loading');
        if (spreadsheetUrl.includes('ここにコピーしたURL')) {
            loadingEl.style.color = 'red';
            loadingEl.innerText = 'エラー: コード内の spreadsheetUrl に設定してください。';
            return;
        }

        Papa.parse(spreadsheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                try {
                    data = results.data.map((item, index) => {
                        const images = item.img ? String(item.img).split(',') : [];
                        const address = item.address ? String(item.address).trim() : '';
                        
                        let locations = [];
                        const prefMatch = address.match(/(.+?[都道府県])/);
                        if (prefMatch) locations.push(prefMatch[1]);
                        
                        const targetCities = ["横浜市", "川崎市", "藤沢市"];
                        targetCities.forEach(city => {
                            if (address.includes(city)) locations.push(city);
                        });

                        return {
                            id: index + 1,
                            type: item.type ? String(item.type).trim() : '',
                            title: item.title ? String(item.title).trim() : '',
                            category: item.category ? String(item.category).trim() : '',
                            comment: item.comment ? String(item.comment).trim() : '',
                            website: item.website ? String(item.website).trim() : '',
                            address: address,
                            locations: locations,
                            hide: item.hide ? String(item.hide).trim() : '0',
                            images: images,
                            liked: false
                        };
                    });
                    
                    shuffleArray(data);
                    buildLocationFilters();
                    loadingEl.style.display = 'none';
                    renderCards();
                } catch (e) {
                    loadingEl.style.color = 'red';
                    loadingEl.innerText = 'データの処理エラー: ' + e.message;
                }
            }
        });
    }

    function buildLocationFilters() {
        const panel = document.getElementById('location-filter-panel');
        panel.innerHTML = '';
        
        const availableLocs = new Set();
        data.filter(d => d.hide !== '1').forEach(d => {
            d.locations.forEach(loc => availableLocs.add(loc));
        });
        
        if (availableLocs.size === 0) {
            panel.innerHTML = '<p>ばしょのデータがありません</p>';
            return;
        }

        const grouped = {};
        availableLocs.forEach(loc => {
            const r = getRegion(loc);
            if (!grouped[r]) grouped[r] = [];
            grouped[r].push(loc);
        });

        for (let r in regionMap) {
            if (!grouped[r]) continue;
            
            const groupDiv = document.createElement('div');
            groupDiv.className = 'filter-group';
            groupDiv.innerHTML = `<div class="filter-group-title">${r}</div>`;
            
            const labelsDiv = document.createElement('div');
            labelsDiv.className = 'filter-labels';

            grouped[r].forEach(loc => {
                const label = document.createElement('label');
                label.className = 'filter-checkbox';
                label.innerHTML = `<input type="checkbox" value="${loc}" onchange="updateLocationFilter(this)"> ${loc}`;
                labelsDiv.appendChild(label);
            });
            
            groupDiv.appendChild(labelsDiv);
            panel.appendChild(groupDiv);
        }
        
        if (grouped["その他"]) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'filter-group';
            groupDiv.innerHTML = `<div class="filter-group-title">その他</div>`;
            const labelsDiv = document.createElement('div');
            labelsDiv.className = 'filter-labels';
            grouped["その他"].forEach(loc => {
                const label = document.createElement('label');
                label.className = 'filter-checkbox';
                label.innerHTML = `<input type="checkbox" value="${loc}" onchange="updateLocationFilter(this)"> ${loc}`;
                labelsDiv.appendChild(label);
            });
            groupDiv.appendChild(labelsDiv);
            panel.appendChild(groupDiv);
        }
    }

    function toggleLocationPanel() {
        const panel = document.getElementById('location-filter-panel');
        const btn = document.getElementById('locationBtn');
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
            btn.classList.remove('active');
        } else {
            panel.style.display = 'block';
            btn.classList.add('active');
        }
    }

    function updateLocationFilter(checkbox) {
        if (checkbox.checked) {
            activeLocationFilters.add(checkbox.value);
            checkbox.parentElement.classList.add('checked');
        } else {
            activeLocationFilters.delete(checkbox.value);
            checkbox.parentElement.classList.remove('checked');
        }
        renderCards();
    }

    function renderCards() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';
        currentDisplayData = []; 

        data.forEach(item => {
            if (item.type !== currentTab) return;
            if (showOnlyLiked && !item.liked) return;
            if (item.images.length === 0) return;
            if (item.hide === '1') return;
            
            if (activeLocationFilters.size > 0 && !item.locations.some(loc => activeLocationFilters.has(loc))) return;

            currentDisplayData.push(item);

            const card = document.createElement('div');
            card.className = 'card';
            const heartClass = item.liked ? 'fa-solid fa-heart liked' : 'fa-solid fa-heart';
            const thumbImg = item.images[0];

            card.innerHTML = `
                <button class="heart-btn ${item.liked ? 'liked' : ''}" onclick="toggleLike(event, ${item.id})">
                    <i class="${heartClass}"></i>
                </button>
                <div onclick="openModal(${item.id})">
                    <img src="${thumbImg}" alt="${item.title}">
                    <div class="card-info">
                        <div class="card-meta">
                            ${item.category ? `<span class="card-category">${item.category}</span>` : ''}
                            ${item.address ? `<span class="card-address"><i class="fa-solid fa-location-dot"></i> ${item.address}</span>` : ''}
                        </div>
                        <h3 class="card-title">${item.title}</h3>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function shuffleCards() { shuffleArray(data); renderCards(); }
    
    function changeTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector('.tab-btn.' + tab).classList.add('active');
        renderCards();
    }

    function toggleLike(event, id) {
        event.stopPropagation();
        const item = data.find(d => d.id === id);
        if (item) { item.liked = !item.liked; renderCards(); }
    }

    function toggleFilter() {
        showOnlyLiked = !showOnlyLiked;
        const btn = document.getElementById('filterBtn');
        if (showOnlyLiked) {
            btn.classList.add('filtering');
        } else {
            btn.classList.remove('filtering');
        }
        renderCards();
    }

    // --- ポップアップ（モーダル）関連の処理 ---

    function openModal(id) {
        const item = data.find(d => d.id === id);
        if (!item) return;
        
        document.getElementById('modal').setAttribute('data-current-id', id);

        const gallery = document.getElementById('modal-gallery');
        gallery.innerHTML = '';
        item.images.forEach(imgUrl => {
            const img = document.createElement('img');
            img.src = imgUrl.trim();
            gallery.appendChild(img);
        });

        // 写真が1枚だけなら画像切替ボタン（< >）を隠す
        const galleryPrevBtn = document.getElementById('gallery-prev-btn');
        const galleryNextBtn = document.getElementById('gallery-next-btn');
        if (item.images.length > 1) {
            galleryPrevBtn.style.display = 'flex';
            galleryNextBtn.style.display = 'flex';
        } else {
            galleryPrevBtn.style.display = 'none';
            galleryNextBtn.style.display = 'none';
        }

        document.getElementById('modal-title').innerText = item.title;
        document.getElementById('modal-category').innerText = item.category || '';
        document.getElementById('modal-category').style.display = item.category ? 'inline-block' : 'none';
        document.getElementById('modal-comment').innerText = item.comment || '';
        
        document.getElementById('link-map').href = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(item.title + ' ' + item.address);
        document.getElementById('link-img').href = 'https://www.google.com/search?tbm=isch&q=' + encodeURIComponent(item.title);
        
        const webBtn = document.getElementById('link-web');
        if (item.website && item.website.startsWith('http')) {
            webBtn.href = item.website;
            webBtn.style.display = 'inline-flex';
        } else {
            webBtn.style.display = 'none';
        }

        document.getElementById('modal').style.display = 'flex';
        gallery.scrollLeft = 0;
    }

    // ギャラリー（画像）の横スクロール処理
    function scrollGallery(direction, event) {
        if (event) event.stopPropagation();
        const gallery = document.getElementById('modal-gallery');
        // 画像1枚分の幅を取得してスクロール
        const scrollAmount = gallery.clientWidth; 
        gallery.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
    }

    // アイテム（候補）の切り替え処理
    function prevModal(event) {
        if (event) event.stopPropagation();
        if (currentDisplayData.length <= 1) return;

        const currentId = parseInt(document.getElementById('modal').getAttribute('data-current-id'));
        let currentIndex = currentDisplayData.findIndex(d => d.id === currentId);
        currentIndex = (currentIndex - 1 + currentDisplayData.length) % currentDisplayData.length;
        openModal(currentDisplayData[currentIndex].id);
    }

    function nextModal(event) {
        if (event) event.stopPropagation();
        if (currentDisplayData.length <= 1) return;

        const currentId = parseInt(document.getElementById('modal').getAttribute('data-current-id'));
        let currentIndex = currentDisplayData.findIndex(d => d.id === currentId);
        currentIndex = (currentIndex + 1) % currentDisplayData.length;
        openModal(currentDisplayData[currentIndex].id);
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    window.onload = loadData;
</script>

</body>
</html>
